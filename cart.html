<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">

        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand fw-bold">
                <img src="assets/Layout/Brand/logo-colored.png" alt="logo">
            </a>

            <!-- Navbar Toggle (for mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- Search Bar -->
                <form class="d-flex mx-auto w-50" onsubmit="searchProducts(event)">
                    <input id="searchInput" class="form-control me-2" type="text" placeholder="Search product name">
                    <select id="categorySelect" class="form-select me-2">

                        <option value="all">All Categories</option>
                        <option value="tech">Tech</option>
                        <option value="interior">Interior</option>
                        <option value="cloth">Clothing</option>
                        <option value="appliances">Appliances</option>

                    </select>
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>

                <!-- Menu Links -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">Cart</a>
                    </li>
                </ul>
            </div>
        </div>

    </nav>

    <!-- CART PRODUCTS -->

    <div class="container mt-5">

        <h2 class="text-center mb-4">Your Cart</h2>

        <div class="row" id="cartContainer"></div>

        <h4 class="text-end mt-4" id="totalPrice"></h4>

    </div>

    <footer class="bg-dark text-white text-center p-4 mt-5">

        <p>© 2026 Brand | All Rights Reserved</p>

    </footer>
    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
